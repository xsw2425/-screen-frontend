<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>云宠牧场—萌宠认养数字化平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body{background:#0a1a33;color:#fff;overflow-x:hidden;}
.header{height:60px;background:#08142b;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid #1a2a4a;}
.logo{font-size:20px;font-weight:bold;color:#00ccff;}
.role{font-size:12px;color:#999;margin-left:10px;}
.container{padding:20px;max-width:1600px;margin:0 auto;}
.panel{background:#0f2040;border-radius:8px;padding:15px;margin-bottom:20px;border:1px solid #1a2a4a;}
.grid-stat{display:grid;grid-template-columns:repeat(6,1fr);gap:15px;margin-bottom:20px;}
.card{background:#14284a;border-radius:8px;padding:20px;text-align:center;border:1px solid #1a2a4a;}
.card .label{font-size:14px;color:#ccc;margin-bottom:10px;}
.card .num{font-size:24px;font-weight:bold;color:#00ccff;}
.row{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;}
.chart-box{height:250px;}
.trace-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;height:250px;}
.trace-grid img{width:100%;height:100%;object-fit:cover;border-radius:4px;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">云宠牧场 <span class="role">管理员后台</span></div>
  <div>超级管理员（管理员） <button style="background:#ff4d4f;color:#fff;border:none;padding:5px 10px;border-radius:4px;">退出登录</button></div>
</div>
<div class="container">
  <h2 style="color:#00ccff;margin-bottom:20px;">云宠牧场-智慧乡村萌宠认养数字化服务监管大屏</h2>
  <div class="panel">
    <h3 style="margin-bottom:15px;color:#fff;">📊 核心运营指标总览</h3>
    <div class="grid-stat">
      <div class="card"><div class="label">累计注册用户</div><div class="num">628</div></div>
      <div class="card"><div class="label">累计认养订单</div><div class="num">586</div></div>
      <div class="card"><div class="label">合作养殖农户</div><div class="num">5</div></div>
      <div class="card"><div class="label">农户年均增收</div><div class="num">1.2W+</div></div>
      <div class="card"><div class="label">平台总营收</div><div class="num">3.2W</div></div>
      <div class="card"><div class="label">溯源图片待审核</div><div class="num">26</div></div>
    </div>
  </div>
  <div class="row">
    <div class="panel">
      <h3 style="margin-bottom:15px;color:#fff;">📈 业务增长趋势分析</h3>
      <div id="lineChart" class="chart-box"></div>
    </div>
    <div class="panel">
      <div id="pieChart" class="chart-box"></div>
    </div>
  </div>
  <div class="row">
    <div class="panel">
      <h3 style="margin-bottom:15px;color:#fff;">💰 营收结构 & 全流程实拍溯源</h3>
      <div id="incomeChart" class="chart-box"></div>
    </div>
    <div class="panel">
      <div class="trace-grid">
        <img src="https://via.placeholder.com/300x200?text=养殖场景" alt="养殖场景" />
        <img src="https://via.placeholder.com/300x200?text=鸡舍内部" alt="鸡舍内部" />
        <img src="https://via.placeholder.com/300x200?text=鸡蛋分拣" alt="鸡蛋分拣" />
        <img src="https://via.placeholder.com/300x200?text=人工分拣" alt="人工分拣" />
      </div>
    </div>
  </div>
</div>
<script>
// 1. 业务增长折线图（完全还原原图）
const lineChart = echarts.init(document.getElementById("lineChart"))
lineChart.setOption({
  tooltip: { trigger: "axis" },
  legend: { data: ["新增用户", "新增订单"], left: "center", textStyle: { color: "#fff" } },
  grid: { left: "3%", right: "4%", bottom: "3%", containLabel: true },
  xAxis: { type: "category", data: ["1月","2月","3月","4月","5月","6月"], axisLine: { lineStyle: { color: "#2a365f" } }, axisLabel: { color: "#a0b0d8" } },
  yAxis: { type: "value", axisLine: { lineStyle: { color: "#2a365f" } }, axisLabel: { color: "#a0b0d8" } },
  series: [
    { name: "新增用户", type: "line", data: [30, 80, 120, 150, 190, 230], itemStyle: { color: "#0099ff" }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(0,153,255,0.3)' }, { offset: 1, color: 'rgba(0,153,255,0.1)' }] } } },
    { name: "新增订单", type: "line", data: [25, 70, 100, 130, 170, 200], itemStyle: { color: "#00cc66" } }
  ]
})
// 2. 认养品类饼图（完全还原原图）
const pieChart = echarts.init(document.getElementById("pieChart"))
pieChart.setOption({
  tooltip: { trigger: "item" },
  legend: { orient: "vertical", left: "left", textStyle: { color: "#fff" } },
  series: [{ type: "pie", radius: ["40%", "70%"], data: [
    { name: "芦花鸡", value: 320, itemStyle: { color: "#0099ff" } },
    { name: "土鹅", value: 150, itemStyle: { color: "#00cc66" } },
    { name: "土鸭", value: 90, itemStyle: { color: "#ff9933" } },
    { name: "其他", value: 26, itemStyle: { color: "#ff6666" } }
  ]}]
})
// 3. 营收结构柱状图（完全还原原图）
const incomeChart = echarts.init(document.getElementById("incomeChart"))
incomeChart.setOption({
  tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
  legend: { data: ["基础认养营收", "增值服务营收", "品牌合作营收"], left: "center", textStyle: { color: "#fff" } },
  grid: { left: "3%", right: "4%", bottom: "3%", containLabel: true },
  xAxis: { type: "category", data: ["一季度", "二季度", "三季度", "四季度"], axisLine: { lineStyle: { color: "#2a365f" } }, axisLabel: { color: "#a0b0d8" } },
  yAxis: { type: "value", axisLine: { lineStyle: { color: "#2a365f" } }, axisLabel: { color: "#a0b0d8" } },
  series: [
    { name: "基础认养营收", type: "bar", data: [7500, 9800, 12000, 14500], itemStyle: { color: "#0099ff" } },
    { name: "增值服务营收", type: "bar", data: [1800, 3200, 4500, 6200], itemStyle: { color: "#00cc66" } },
    { name: "品牌合作营收", type: "bar", data: [1200, 2500, 3500, 4200], itemStyle: { color: "#ff9933" } }
  ]
})
// 窗口自适应
window.addEventListener('resize', () => { lineChart.resize(); pieChart.resize(); incomeChart.resize(); })
</script>
</body>
</html>
